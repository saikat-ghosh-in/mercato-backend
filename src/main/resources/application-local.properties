server.port=8080

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.phone=${ADMIN_PHONE}

frontend.base.url=http://localhost:5173
images.base.url=http://localhost:8080/images

# Local DB (Postgres example)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=${JWT_TTL}
spring.app.jwtCookieName=${JWT_COOKIE_NAME}

#cashfree
cashfree.app.id=${CASHFREE_APP_ID}
cashfree.secret.key=${CASHFREE_APP_ID}
cashfree.base.url=${CASHFREE_BASE_URL}
cashfree.api.version=${CASHFREE_API_VERSION}
cashfree.return.url=${CASHFREE_RETURN_URL}
cashfree.notify.url=${CASHFREE_NOTIFY_URL}

images.products.folder=assets/images/products
images.products.placeholder.url=https://placehold.net/600x400.png

logging.level.org.springframework.security=ERROR
logging.level.org.hibernate=ERROR